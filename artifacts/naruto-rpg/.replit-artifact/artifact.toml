kind = "web"
previewPath = "/"
title = "Naruto RPG Community"
version = "1.0.0"
id = "artifacts/naruto-rpg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20457

[services.development]
run = "pnpm --filter @workspace/naruto-rpg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/naruto-rpg", "run", "build" ]
publicDir = "artifacts/naruto-rpg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20457"
BASE_PATH = "/"
